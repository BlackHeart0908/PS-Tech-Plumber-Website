<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ea580c"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
  </defs>

  <!-- House roof (inverted V) -->
  <path d="M 50 100 L 100 50 L 150 100" fill="none" stroke="url(#blueGrad)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Right wall -->
  <path d="M 130 100 L 130 160 L 105 160" fill="none" stroke="url(#blueGrad)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Left wall with curve -->
  <path d="M 70 100 L 70 150 C 70 165 80 165 90 155" fill="none" stroke="url(#blueGrad)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Water droplet in center -->
  <path d="M 100 85 C 90 95 85 105 85 115 C 85 128 92 135 100 135 C 108 135 115 128 115 115 C 115 105 110 95 100 85 Z" fill="url(#blueGrad)"/>

  <!-- Lightning bolt accent -->
  <polygon points="102 78 95 105 100 105 88 135 110 105 105 105" fill="url(#orangeGrad)"/>
</svg>